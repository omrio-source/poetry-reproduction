name: "Frogbot Scan Pull Request"
on:
  pull_request_target:
    types: [ opened, synchronize ]
permissions:
  pull-requests: write
  contents: read
  security-events: write
jobs:
  scan-pull-request:
    runs-on: self-hosted   # localhost:21500 is only reachable from the self-hosted runner
    steps:
      - uses: jfrog/frogbot@v2
        env:
          JF_URL: ${{ secrets.JF_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}
          JF_GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # pip project: resolve deps through Artifactory and point at requirements.txt
          JF_DEPS_REPO: pypi-virtual
          JF_REQUIREMENTS_FILE: requirements.txt
          # JF_WATCHES: <watch-name>   # enforce the same policy as the pipeline
